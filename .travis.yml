language: php
php:
- 7.4
script: "./scripts/php_build.sh"
before_install:
- chmod +x ./scripts/php_build.sh
- chmod +x ./scripts/cf-blue-green-deploy.sh
before_deploy:
- echo "Updating packages.."
- wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key |
  sudo apt-key add -
- echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
- sudo apt-get update
- echo "Installing cf cli"
- sudo apt-get install cf7-cli
- cf -v
- echo "Installing cf blue-green deploy plugin"
- cf add-plugin-repo CF-Community https://plugins.cloudfoundry.org
- cf install-plugin blue-green-deploy -r CF-Community -f
- echo "Plugin installed"
branches:
  only:
  - feature/blue_green_deployments
deploy:
  provider: script
  skip_cleanup: true
  script: "./scripts/cf-blue-green-deploy.sh ccs-scale-buyer-ui manifest-sandbox-blue-green.yml
    sandbox"
  on:
    branch: feature/blue_green_deployments
env:
  global:
  - secure: 
  - secure: 
  - secure: 
  - secure: 
